baseURL: "https://naxyl.re/"
locale: "en"
title: "naxyl"


module:
  imports:
    - path: github.com/geekifan/hugo-theme-chirpy

params:
  mainSections: ["post"]
  theme:
    mode: dark
  avatar: "img/avatar.jpg"
  tagline: "Reverse engineering enthusiast"
  author: "naxyl"
  social:
    links:
      - icon: "fab fa-github"
        url: "https://github.com/naxyl"
      - icon: "fas fa-envelope"
        url: "mailto:naxylre@protonmail.com"
menu:
  main:
    - identifier: home
      name: Home
      url: /
      weight: 10
      pre: fa-house
    - identifier: categories
      name: Categories
      url: /categories/
      weight: 20
      pre: fa-folder-open
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 30
      pre: fa-tags
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 40
      pre: fa-archive
    - identifier: about
      name: About
      url: /about/
      weight: 50
      pre: fa-info-circle

markup:
  goldmark:
    renderer:
      unsafe: true